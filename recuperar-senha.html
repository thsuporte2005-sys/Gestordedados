<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha | Gestor de Dados</title>
  <link rel="icon" type="image/png" href="imagens/gestor.png">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { 500: '#10b981', 600: '#059669', 900: '#064e3b' } },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-[#f8fafc] text-gray-900 flex items-center justify-center p-4">
  <main class="w-full max-w-md">
    <section class="bg-white border border-gray-200 shadow-xl rounded-2xl p-7 sm:p-8 fade-in">
      <div class="text-center mb-8">
        <img src="imagens/gestor.png" alt="Gestor de Dados" class="h-16 w-16 object-contain mx-auto mb-4">
        <h1 class="text-2xl font-bold tracking-tight">Recuperar Senha</h1>
        <p class="text-sm text-gray-500 mt-2">Receba um codigo e defina uma nova senha.</p>
      </div>

      <form id="reset-form" class="space-y-4" novalidate>
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">E-mail</label>
          <input id="email" type="email" autocomplete="email" class="auth-input" placeholder="admin@gestor.com" required>
          <p id="email-error" class="auth-error"></p>
        </div>

        <button id="send-btn" type="button" class="w-full bg-gray-900 hover:bg-gray-800 text-white rounded-xl py-3 font-bold shadow-sm transition flex items-center justify-center gap-2">
          <i class="ph ph-paper-plane-tilt"></i>
          Enviar codigo
        </button>

        <div id="code-area" class="hidden space-y-4 pt-4 border-t border-gray-100">
          <div>
            <label for="code" class="block text-sm font-semibold text-gray-700 mb-1">Codigo de verificacao</label>
            <input id="code" type="text" inputmode="numeric" class="auth-input" placeholder="000000">
            <p id="code-help" class="text-xs text-gray-500 mt-1"></p>
          </div>
          <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Nova senha</label>
            <input id="password" type="password" autocomplete="new-password" class="auth-input" placeholder="Minimo 8 caracteres">
          </div>
          <button id="submit-btn" type="submit" class="w-full bg-brand-500 hover:bg-brand-600 text-white rounded-xl py-3 font-bold shadow-sm transition flex items-center justify-center gap-2">
            <i class="ph ph-lock-key-open"></i>
            Atualizar senha
          </button>
        </div>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Lembrou a senha?
        <a href="login.html" class="font-semibold text-brand-600 hover:underline">Entrar</a>
      </p>
    </section>
  </main>

  <div id="toast-container" class="fixed bottom-5 right-5 z-[200] flex flex-col gap-3 pointer-events-none"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/supabase.js"></script>
  <script src="services/auth.js"></script>
  <script>
    const form = document.getElementById('reset-form');
    const email = document.getElementById('email');
    const code = document.getElementById('code');
    const password = document.getElementById('password');
    const sendBtn = document.getElementById('send-btn');
    const submitBtn = document.getElementById('submit-btn');

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const isError = type === 'error';
      toast.className = `translate-y-4 opacity-0 transition-all duration-300 bg-white border-l-4 ${isError ? 'border-red-500' : 'border-brand-500'} p-4 rounded-xl shadow-lg flex items-center gap-3 w-80 pointer-events-auto`;
      toast.innerHTML = `<div class="h-8 w-8 rounded-full ${isError ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-brand-600'} flex items-center justify-center"><i class="ph ${isError ? 'ph-x' : 'ph-check-circle'}"></i></div><p class="text-sm text-gray-700 font-medium">${message}</p>`;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.remove('translate-y-4', 'opacity-0'));
      setTimeout(() => {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => toast.remove(), 250);
      }, 4200);
    }

    function validateEmail() {
      const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
      document.getElementById('email-error').textContent = ok ? '' : 'Informe um e-mail valido.';
      return ok;
    }

    sendBtn.addEventListener('click', async () => {
      if (!validateEmail()) return;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="h-4 w-4 rounded-full border-2 border-white border-t-transparent animate-spin"></span> Enviando...';
      try {
        const result = await window.AuthManager.requestPasswordReset(email.value);
        document.getElementById('code-area').classList.remove('hidden');
        document.getElementById('code-help').textContent = result.demoCode ? `Modo demo: codigo ${result.demoCode}` : 'Confira sua caixa de entrada.';
        showToast('Codigo de recuperacao enviado.');
      } catch (error) {
        showToast(error.message || 'Nao foi possivel enviar o codigo.', 'error');
      } finally {
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<i class="ph ph-paper-plane-tilt"></i> Enviar codigo';
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!validateEmail()) return;
      if (!window.AuthManager.validatePassword(password.value)) {
        showToast('A nova senha precisa ter 8 caracteres, uma maiuscula e um numero.', 'error');
        return;
      }
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="h-4 w-4 rounded-full border-2 border-white border-t-transparent animate-spin"></span> Salvando...';
      try {
        await window.AuthManager.confirmPasswordReset({
          email: email.value,
          code: code.value.trim(),
          password: password.value
        });
        showToast('Senha atualizada. Entrando...');
        setTimeout(() => window.location.href = 'login.html', 800);
      } catch (error) {
        showToast(error.message || 'Nao foi possivel atualizar a senha.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="ph ph-lock-key-open"></i> Atualizar senha';
      }
    });

    window.AuthManager.ensureSeedUser();
  </script>
</body>
</html>
