<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Gestor de Dados</title>
  <link rel="icon" type="image/png" href="imagens/gestor.png">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { 500: '#10b981', 600: '#059669', 900: '#064e3b' } },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-[#f8fafc] text-gray-900 flex items-center justify-center p-4">
  <main class="w-full max-w-md">
    <section class="bg-white border border-gray-200 shadow-xl rounded-2xl p-7 sm:p-8 fade-in">
      <div class="text-center mb-8">
        <img src="imagens/gestor.png" alt="Gestor de Dados" class="h-16 w-16 object-contain mx-auto mb-4">
        <h1 class="text-2xl font-bold tracking-tight">Entrar no Ecossistema</h1>
        <p class="text-sm text-gray-500 mt-2">Acesse seu painel de funis, pixel e IA contextual.</p>
      </div>

      <form id="login-form" class="space-y-4" novalidate>
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">E-mail</label>
          <input id="email" type="email" autocomplete="email" class="auth-input" placeholder="admin@gestor.com" required>
          <p id="email-error" class="auth-error"></p>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1">
            <label for="password" class="block text-sm font-semibold text-gray-700">Senha</label>
            <a href="recuperar-senha.html" class="text-xs font-semibold text-brand-600 hover:underline">Recuperar senha</a>
          </div>
          <div class="relative">
            <input id="password" type="password" autocomplete="current-password" class="auth-input pr-11" placeholder="Admin123!" required>
            <button type="button" onclick="togglePassword('password', this)" class="absolute right-2 top-1/2 -translate-y-1/2 h-8 w-8 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50">
              <i class="ph ph-eye"></i>
            </button>
          </div>
          <p id="password-error" class="auth-error"></p>
        </div>

        <button id="submit-btn" type="submit" class="w-full bg-brand-500 hover:bg-brand-600 text-white rounded-xl py-3 font-bold shadow-sm transition flex items-center justify-center gap-2">
          <i class="ph ph-sign-in"></i>
          Entrar
        </button>
      </form>

      <button id="demo-login" class="mt-3 w-full border border-gray-200 bg-white hover:bg-gray-50 text-gray-700 rounded-xl py-3 font-semibold transition flex items-center justify-center gap-2">
        <i class="ph ph-sparkle"></i>
        Usar acesso demo
      </button>

      <p class="text-center text-sm text-gray-500 mt-6">
        Ainda nao tem conta?
        <a href="cadastro.html" class="font-semibold text-brand-600 hover:underline">Criar cadastro</a>
      </p>
    </section>
  </main>

  <div id="toast-container" class="fixed bottom-5 right-5 z-[200] flex flex-col gap-3 pointer-events-none"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/supabase.js"></script>
  <script src="services/auth.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const isError = type === 'error';
      toast.className = `translate-y-4 opacity-0 transition-all duration-300 bg-white border-l-4 ${isError ? 'border-red-500' : 'border-brand-500'} p-4 rounded-xl shadow-lg flex items-center gap-3 w-80 pointer-events-auto`;
      toast.innerHTML = `
        <div class="h-8 w-8 rounded-full ${isError ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-brand-600'} flex items-center justify-center"><i class="ph ${isError ? 'ph-x' : 'ph-check-circle'}"></i></div>
        <p class="text-sm text-gray-700 font-medium">${message}</p>
      `;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.remove('translate-y-4', 'opacity-0'));
      setTimeout(() => {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => toast.remove(), 250);
      }, 3500);
    }

    function setError(id, message) {
      document.getElementById(`${id}-error`).textContent = message || '';
      document.getElementById(id).classList.toggle('border-red-300', Boolean(message));
    }

    function validate() {
      const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
      setError('email', emailValid ? '' : 'Informe um e-mail valido.');
      setError('password', password.value.length >= 8 ? '' : 'A senha precisa ter pelo menos 8 caracteres.');
      return emailValid && password.value.length >= 8;
    }

    function togglePassword(id, button) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      button.innerHTML = `<i class="ph ${input.type === 'password' ? 'ph-eye' : 'ph-eye-slash'}"></i>`;
    }

    email.addEventListener('input', validate);
    password.addEventListener('input', validate);

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!validate()) return;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="h-4 w-4 rounded-full border-2 border-white border-t-transparent animate-spin"></span> Entrando...';
      try {
        await window.AuthManager.signIn(email.value, password.value);
        showToast('Sessao iniciada com seguranca.');
        setTimeout(() => window.location.href = 'index.html', 600);
      } catch (error) {
        showToast(error.message || 'Nao foi possivel entrar.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="ph ph-sign-in"></i> Entrar';
      }
    });

    document.getElementById('demo-login').addEventListener('click', async () => {
      email.value = 'admin@gestor.com';
      password.value = 'Admin123!';
      form.dispatchEvent(new Event('submit'));
    });

    window.AuthManager.ensureSeedUser();
  </script>
</body>
</html>
