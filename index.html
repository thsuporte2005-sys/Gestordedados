<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de dados</title>
  
  <link rel="icon" type="image/png" href="imagens/gestor.png">
  <link rel="stylesheet" href="style.css">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              900: '#0c4a6e',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#F8F8F8] font-sans flex h-screen overflow-hidden text-gray-800">
  
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full hidden md:flex flex-shrink-0 z-20 shadow-sm">
    <div class="h-16 flex items-center px-6 border-b border-gray-100">
      <img src="imagens/gestor.png" alt="Logo" class="h-8 w-auto object-contain mr-2" onerror="this.style.display='none'">
      <span class="font-bold text-lg text-gray-900 tracking-tight">Gestor de dados</span>
    </div>
    <div class="p-4 flex-1 overflow-y-auto space-y-1">
      <p class="px-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 mt-2">Workspace</p>
      <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-emerald-50 hover:text-[#10b981] transition-all"><i class="ph ph-squares-four text-lg"></i> Dashboard Inteligente</button>
      <button onclick="navigate('leads')" id="nav-leads" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-emerald-50 hover:text-[#10b981] transition-all"><i class="ph ph-chart-line-up text-lg"></i> Analytics Estratégico</button>

      <p class="px-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 mt-6">Engenharia</p>
      <button onclick="navigate('builder')" id="nav-builder" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-emerald-50 hover:text-[#10b981] transition-all"><i class="ph ph-kanban text-lg"></i> Projetos & Funis</button>
      <button onclick="navigate('flow')" id="nav-flow" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-emerald-50 hover:text-[#10b981] transition-all"><i class="ph ph-git-branch text-lg"></i> Automação Visual</button>
      <button onclick="navigate('design')" id="nav-design" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-emerald-50 hover:text-[#10b981] transition-all"><i class="ph ph-megaphone text-lg"></i> Campanhas</button>
      <button onclick="navigate('integrate')" id="nav-integrate" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-emerald-50 hover:text-[#10b981] transition-all"><i class="ph ph-code text-lg"></i> Integração Universal</button>
    </div>
    <div class="p-4 border-t border-gray-100">
      <button onclick="openSettings()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all"><i class="ph ph-gear text-lg"></i> Configurações</button>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden bg-[#F8F8F8]">
    <!-- Header -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-6 z-10 flex-shrink-0">
      <div class="flex items-center gap-4">
        <!-- Mobile menu toggle -->
        <button class="md:hidden text-gray-500 hover:text-[#10b981] transition"><i class="ph ph-list text-2xl"></i></button>
        <h1 class="text-xl font-bold text-gray-900 hidden sm:block" id="header-title">Dashboard Inteligente</h1>
      </div>
      <div class="flex items-center space-x-3 sm:space-x-4">
        <span class="hidden sm:inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-medium bg-emerald-50 text-emerald-700 border border-emerald-100">
          <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
          Sistema Operacional
        </span>
        <div class="h-6 w-px bg-gray-200 hidden sm:block mx-1"></div>
        <button class="relative text-gray-400 hover:text-[#10b981] transition p-1.5 rounded-full hover:bg-emerald-50"><i class="ph ph-bell text-xl"></i><span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white"></span></button>
        <button onclick="window.open('quiz.html', '_blank')" class="text-gray-400 hover:text-[#10b981] p-1.5 transition rounded-full hover:bg-emerald-50" title="Visualizar Live"><i class="ph ph-eye text-xl"></i></button>
        <button onclick="publish()" class="bg-[#10b981] hover:bg-[#059669] text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium shadow-sm transition-all"><i class="ph ph-rocket-launch"></i> <span class="hidden sm:inline">Publicar</span></button>
        <!-- Profile Avatar Dropdown -->
        <div class="relative">
          <button onclick="toggleProfileMenu(event)" id="profile-btn" class="h-9 w-9 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center cursor-pointer ml-1 sm:ml-2 hover:border-[#10b981] hover:bg-emerald-50 transition-colors focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2">
            <i class="ph ph-user text-gray-500"></i>
          </button>
          
          <!-- Dropdown Menu -->
          <div id="profile-dropdown" class="hidden absolute right-0 mt-3 w-72 bg-white rounded-xl shadow-xl border border-gray-100 z-50 overflow-hidden fade-in transform origin-top-right transition-all">
            <div class="p-4 border-b border-gray-100 bg-gray-50/80 flex items-center gap-3 backdrop-blur-sm">
              <div class="h-12 w-12 rounded-full bg-gradient-to-br from-[#10b981] to-emerald-700 flex items-center justify-center text-white font-bold text-xl shadow-inner">
                TS
              </div>
              <div>
                <p class="text-sm font-bold text-gray-900 leading-none mb-1">Tiago Silva</p>
                <p class="text-xs text-gray-500">Admin do Ecossistema</p>
              </div>
            </div>
            
            <div class="p-2">
              <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors"><i class="ph ph-image text-lg text-gray-400"></i> Mudar Foto de Perfil</button>
              <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors"><i class="ph ph-pencil-simple text-lg text-gray-400"></i> Editar Nome de Exibição</button>
              <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors"><i class="ph ph-envelope-simple text-lg text-gray-400"></i> Atualizar E-mail</button>
              <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors"><i class="ph ph-lock-key text-lg text-gray-400"></i> Alterar Senha</button>
            </div>
            
            <div class="border-t border-gray-100 p-2">
              <button class="w-full flex items-center justify-between px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors">
                <div class="flex items-center gap-3"><i class="ph ph-devices text-lg text-gray-400"></i> Dispositivos Conectados</div>
                <span class="bg-gray-100 text-gray-500 text-[10px] px-2 py-0.5 rounded-full font-bold">2 ativos</span>
              </button>
              <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors"><i class="ph ph-bell-ringing text-lg text-gray-400"></i> Configurações de Notificação</button>
            </div>
            
            <div class="border-t border-gray-100 p-2 bg-gray-50/50">
              <button onclick="window.location.href='login.html'" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-bold text-red-600 hover:bg-red-50 rounded-lg transition-colors"><i class="ph ph-sign-out text-lg"></i> Encerrar Sessão Segura</button>
            </div>
          </div>
        </div>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8" id="app-content">
      <!-- Injected views go here -->
    </main>
  </div>

  <div id="settings-modal" class="fixed inset-0 bg-black/40 z-[100] hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] fade-in">
      <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
        <h3 class="font-bold text-lg text-gray-900">Configurações do Ecossistema</h3>
        <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-700 p-1 rounded-lg hover:bg-gray-100 transition"><i class="ph ph-x"></i></button>
      </div>
      <div class="p-6 overflow-y-auto space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">URL App Supabase</label>
          <input type="text" id="set-supa-url" class="w-full border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-[#10b981] focus:ring-2 focus:ring-emerald-100 transition" placeholder="https://xyz.supabase.co">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Chave Anon Supabase</label>
          <input type="text" id="set-supa-key" class="w-full border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-[#10b981] focus:ring-2 focus:ring-emerald-100 transition" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI...">
        </div>
      </div>
      <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
        <button onclick="closeSettings()" class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">Cancelar</button>
        <button onclick="saveSettings()" class="px-4 py-2 bg-[#10b981] text-white rounded-lg text-sm font-medium hover:bg-[#059669] transition shadow-sm">Salvar Banco de Dados</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/supabase.js"></script>
  <script src="services/tracking.js"></script>
  <script src="services/leads.js"></script>
  <script src="services/builder.js"></script>
  <script src="script.js"></script>
  <script>
    // Profile Dropdown Logic
    function toggleProfileMenu(e) {
      if(e) e.stopPropagation();
      const dropdown = document.getElementById('profile-dropdown');
      dropdown.classList.toggle('hidden');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(event) {
      const dropdown = document.getElementById('profile-dropdown');
      const btn = document.getElementById('profile-btn');
      
      if (!dropdown.classList.contains('hidden') && !dropdown.contains(event.target) && !btn.contains(event.target)) {
        dropdown.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
